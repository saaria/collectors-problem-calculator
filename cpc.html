<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コレクターズ・プロブレム計算ツール</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./cpc.css">
</head>
<body class="container py-4">
    <main>
        <h2 class="mb-4">コレクターズ・プロブレム計算ツール</h2>
        <p>異なるN種類のアイテムをランダムに集める場合、全種類を揃えるのに必要な試行回数の期待値を計算します。</p>
        <div class="mb-3">
            <label for="itemCount" class="form-label">アイテムの種類数（最大99）:</label>
            <input type="number" id="itemCount" class="form-control" value="2" min="2" max="99">
        </div>
        
        <div class="mb-3">
            <label for="itemCost" class="form-label">アイテムを1つ入手する為に必要な費用:</label>
            <input type="number" id="itemCost" class="form-control" value="1000" min="1">
        </div>
        
        <h3 class="mt-4">結果</h3>
        <p>コンプリートに必要な試行回数の期待値:<br><strong id="expectedTrials" class="text-danger fs-5">-</strong> <small>※運による誤差あり</small></p>
        <canvas id="distributionChart" height="120"></canvas>
        <p>
            90%の人は <strong id="p90Text">-</strong> 回以内にコンプリート<br>
            最も運が悪い上位1%の人は <strong id="p99Text">-</strong> 回
        </p>
        <h4>費用の見積もり</h4>
        <p>期待値だと <strong id="expectedCost">-</strong> 円<br>
            90%の人は <strong id="cost90Text">-</strong> 円<br>
            最も運が悪い上位1%の人は <strong id="cost99Text">-</strong> 円
        </p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./cpc.js"></script>

</body>
</html>
